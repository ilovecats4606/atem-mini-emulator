name: Build Windows Qt App

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # ─────────────────────────────────────────────
    # 1. Checkout
    # ─────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ─────────────────────────────────────────────
    # 2. Setup MSVC (Visual Studio Build Tools)
    # ─────────────────────────────────────────────
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ─────────────────────────────────────────────
    # 3. Setup Python (fix WindowsApps issues)
    # ─────────────────────────────────────────────
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    # ─────────────────────────────────────────────
    # 4. Install Qt via aqtinstall (stable method)
    # ─────────────────────────────────────────────
    - name: Install Qt
      shell: pwsh
      run: |
        pip install aqtinstall

        python -m aqt install-qt windows desktop 6.10.0 win64_msvc2022_64 -O C:\Qt

    # ─────────────────────────────────────────────
    # 5. Set Qt environment variables
    # ─────────────────────────────────────────────
    - name: Configure Qt environment
      shell: pwsh
      run: |
        echo "Qt6_DIR=C:\Qt\6.10.0\msvc2022_64\lib\cmake\Qt6" >> $env:GITHUB_ENV
        echo "PATH=C:\Qt\6.10.0\msvc2022_64\bin;$env:PATH" >> $env:GITHUB_ENV

    # ─────────────────────────────────────────────
    # 6. Configure CMake
    # ─────────────────────────────────────────────
    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 ^
          -DQt6_DIR="C:\Qt\6.10.0\msvc2022_64\lib\cmake\Qt6"

    # ─────────────────────────────────────────────
    # 7. Build
    # ─────────────────────────────────────────────
    - name: Build
      run: cmake --build build --config Release

    # ─────────────────────────────────────────────
    # 8. Package output
    # ─────────────────────────────────────────────
    - name: Package artifacts
      shell: pwsh
      run: |
        mkdir dist

        copy build\Release\*.exe dist\
        copy build\Release\*.dll dist\ -ErrorAction SilentlyContinue

        Compress-Archive -Path dist\* -DestinationPath atem-emulator-win64.zip

    # ─────────────────────────────────────────────
    # 9. Upload artifact
    # ─────────────────────────────────────────────
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: atem-emulator-win64
        path: atem-emulator-win64.zip
